<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Registration - Sizzling Hair Salon</title>
</head>
<body>
    <header>

        <a href="index.html" class="logo-container">
            <div class="logo">Sizzling</div>
        </a>
        
        <div class="hamburger" onclick="toggleMenu()">&#9776;</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="registration.html">Registration</a></li>
                <li><a href="admin-login.html">Admin Login</a></li>
            </ul>
        </nav>
    </header>
    
    <main class="registration">
        <form class="form" action="connect.jsp">
        <h1>Registration</h1>
        <p>Sign up for our services and receive exclusive offers.</p>
        
        <form id="registrationForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
           
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            
            <label for="gender">Gender:</label>
            <select id="gender" name="gender">
                <option value="select">Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone:</label>
            <input type="text" id="phone" name="phone" pattern="\d+" title="Please enter only numeric characters." required>

            <label for="address">Address:</label>
            <textarea id="address" name="address" rows="4" required></textarea>

            <label for="city">City:</label>
            <input type="text" id="city" name="city" required>

            <button type="submit" class="cta-button">Register</button>
        </form>
    </main>

    <footer>
        &copy; 2023 Sizzling Hair Salon. All rights reserved.
    </footer>
</body>
</html>
