<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Add Service - Sizzling Hair Salon</title>
</head>
<body>

    <header>
        <header>

            <a href="index.html" class="logo-container">
                <div class="logo">Sizzling</div>
            </a>
            
            <div class="hamburger" onclick="toggleMenu()">&#9776;</div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="contact.html">Contact</a></li>

                </ul>
            </nav>
        </header>
    </header>

    <main>
        <h1>Add Service</h1>

        <form action="addservice.jsp" method="post" enctype="multipart/form-data">
            <label for="serviceName">Service Name:</label>
            <input type="text" id="serviceName" name="serviceName" required>

            <label for="serviceImage">Service Image:</label>
            <input type="file" id="serviceImage" name="serviceImage" accept="image/*" required>

            <label for="servicePrice">Service Price (₹):</label>
            <input type="number" id="servicePrice" name="servicePrice" required>

            <button type="submit">Add Service</button>
        </form>

    </main>
